<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">

        <header>
            <h1 class="title">To Do List</h1>

            <div id="search-tasks">
                <input class="searchBox" id="inputSearch" type="text" placeholder="Search tasks..." />
                <button class="searchBtn" id="search" type="submit">Search</button>
            </div>

        </header>

        <div id="output"></div>     
        


       <div id="add-task">
            <input class="addBox" type="text" id="input" placeholder="Add a new task..." />
            <button class="addBtn" id="addBtn" type="submit">Add</button>
       </div>
        

    </div>
    
   
    <script src="index.js"></script>
</body>
</html>
